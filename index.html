<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Processor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* Custom Styles & Print Styles */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            color-scheme: dark;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        /* Hide elements by default */
        .hidden-view { display: none !important; }

        /* Custom Scrollbar for inner content */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        /* Select Color States */
        select.status-pass { background-color: #134e4a; color: #86efac; font-weight: 600; }
        select.status-fail { background-color: #7f1d1d; color: #fca5a5; font-weight: 600; }
        select.status-na { background-color: #1e293b; color: #cbd5e1; font-weight: 600; }

        /* Modern minimal buttons */
        .btn-modern {
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: #0ea5e9;
            color: #ffffff;
            border-color: #0ea5e9;
        }
        .btn-primary:hover {
            background-color: #0284c7;
            border-color: #0284c7;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-success {
            background-color: #10b981;
            color: #ffffff;
            border-color: #10b981;
        }
        .btn-success:hover {
            background-color: #059669;
            border-color: #059669;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-outline {
            background-color: transparent;
            color: #cbd5e1;
            border-color: #475569;
        }
        .btn-outline:hover {
            background-color: #1e293b;
            color: #e2e8f0;
            border-color: #64748b;
        }

        .btn-secondary {
            background-color: #475569;
            color: #f1f5f9;
        }
        .btn-secondary:hover {
            background-color: #64748b;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(71, 85, 105, 0.3);
        }

        /* Input styling for dark mode */
        input[type="text"],
        input[type="date"],
        textarea,
        select {
            background-color: #1e293b !important;
            color: #e2e8f0 !important;
            border-color: #334155 !important;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus {
            background-color: #334155 !important;
            border-color: #0ea5e9 !important;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        input::placeholder {
            color: #64748b !important;
        }

        /* Dark table styling */
        table {
            background-color: #1e293b;
        }

        thead {
            background-color: #0f172a !important;
        }

        tbody tr {
            border-color: #334155;
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #334155;
        }

        th, td {
            color: #e2e8f0;
        }

        @media print {
            @page {
                size: A4 landscape;
                margin: 1cm;
            }
            body {
                background: white !important;
                color: black !important;
            }
            /* Hide UI components not meant for the printed document */
            #sidebar, #top-header, .no-print {
                display: none !important;
            }
            #main-content {
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
                height: auto !important;
                display: block !important;
                background: white !important;
            }
            .print-only {
                display: block !important;
            }
            
            /* Ensure the active sheet is printed, hide dashboard if open */
            #dashboard-view { display: none !important; }
            .sheet-view.active-sheet { display: block !important; }
            .sheet-view:not(.active-sheet) { display: none !important; }

            /* Table Print Formatting */
            table {
                width: 100% !important;
                border-collapse: collapse !important;
                page-break-inside: auto;
                background: white !important;
                color: black !important;
            }
            tr { page-break-inside: avoid; page-break-after: auto; }
            th {
                background-color: #e5e7eb !important;
                color: black !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                font-weight: bold;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 6px !important;
                font-size: 10pt !important;
                color: black !important;
            }
            
            /* Flatten form inputs to look like normal text on print */
            input, select, textarea {
                border: none !important;
                background: transparent !important;
                color: black !important;
                box-shadow: none !important;
                outline: none !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-appearance: none !important;
                appearance: none !important;
                font-size: 10pt !important;
                width: auto !important;
            }
            /* Hide the dropdown arrow in select */
            select::-ms-expand { display: none; }
            input::placeholder, textarea::placeholder { color: transparent !important; }
        }
    </style>
</head>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen relative bg-slate-900">

                </div>
                
                <!-- Export Buttons -->

                        PDF

            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto p-6 lg:p-8">

                    <p class="text-slate-400 mt-2">Track completion progress across all survey platforms and data sources.</p>
                </div>
                
                <!-- Stats Grid -->
                <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <!-- Dynamically populated stat cards -->
                </div>
            </div>

            <!-- Sheets Container -->
            <div id="sheets-container" class="hidden-view max-w-full">
                <!-- Dynamically populated sheets -->
            </div>

        </main>
    </div>

            {"no": 3, "category": "A. Datum", "check_item": "Time reference (UTC) synced across all systems.", "criteria": "Time offset within equipment spec."},
            {"no": 4, "category": "B. Calibration", "check_item": "MBES patch test is complete (latency, roll, pitch, yaw).", "criteria": "Done per IHO S-44 / manufacturer guidance."},
            {"no": 5, "category": "B. Calibration", "check_item": "GNSS antenna to transducer/DVL offset checked.", "criteria": "Offset error under 2 cm (survey grade)."},
            {"no": 6, "category": "B. Calibration", "check_item": "AUV INS/DVL calibration and drift check done.", "criteria": "Drift rate within spec."},
            {"no": 7, "category": "B. Calibration", "check_item": "SBP transducer offset from reference checked.", "criteria": "Matches installation offset drawing."},
            {"no": 8, "category": "C. Corrections", "check_item": "Sound velocity profile (SVP) current and covers survey area.", "criteria": "SVP age under 24 hours or more frequent."},
            {"no": 9, "category": "C. Corrections", "check_item": "Tide / water level correction applied.", "criteria": "Uses nearest tide station or RTK tide."},
            {"no": 10, "category": "C. Corrections", "check_item": "SBP sediment velocity documented with source.", "criteria": "State velocity and cite core sample or reference."},
            {"no": 11, "category": "D. Navigation", "check_item": "AUV navigation fixes occur at proper intervals.", "criteria": "Fix spacing follows mission plan."},
            {"no": 12, "category": "D. Navigation", "check_item": "AUV drift at time of detection is within limits.", "criteria": "Accumulated drift under project threshold."},
            {"no": 13, "category": "D. Navigation", "check_item": "Position uncertainty (THU/TVU) calculated for each sensor.", "criteria": "Meets survey Order per IHO S-44."},
            {"no": 14, "category": "E. Comparison", "check_item": "Horizontal distance (Delta XY) within combined uncertainty.", "criteria": "Delta XY <= RSS(THU_A, THU_B) at 95%."},
            {"no": 15, "category": "E. Comparison", "check_item": "Vertical distance (Delta Z) within combined uncertainty.", "criteria": "Delta Z <= RSS(TVU_A, TVU_B) at 95%."},
            {"no": 16, "category": "E. Comparison", "check_item": "Object shape/appearance consistent across datasets.", "criteria": "Confirmed visually by interpreter."},
            {"no": 17, "category": "E. Comparison", "check_item": "Statistical test (Mahalanobis / chi-square) passed.", "criteria": "Mahalanobis^2 < chi-square critical value."},
            {"no": 18, "category": "F. Records", "check_item": "Metadata recorded (date, equipment, operator, version).", "criteria": "Per QA/QC procedure."},
            {"no": 19, "category": "F. Records", "check_item": "QC report reviewed and approved.", "criteria": "Signed off by survey party chief or authorized reviewer."}
          ]
        };

        // State object to track completion
        let appState = {};
        let activeTabID = 'dashboard';

        document.addEventListener('DOMContentLoaded', () => {
            const sidebarLinks = document.getElementById('sidebar-links');
            const sheetsContainer = document.getElementById('sheets-container');
            const dashboardGrid = document.getElementById('dashboard-grid');

            Object.keys(qcData).forEach((sheetName) => {
                const safeId = sheetName.replace(/\s+/g, '-');
                
                // 1. Initialize State for tracking progress
                appState[sheetName] = { total: qcData[sheetName].length, completed: 0 };

                // 2. Generate Sidebar Links
                const linkBtn = document.createElement('button');
                linkBtn.id = `nav-${safeId}`;
                linkBtn.className = "w-full flex items-center space-x-3 px-6 py-2.5 text-left text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition-colors nav-btn text-sm";
                linkBtn.innerHTML = `
                    <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span>${sheetName}</span>
                `;
                linkBtn.onclick = () => switchTab(sheetName);
                sidebarLinks.appendChild(linkBtn);

                // 3. Generate Dashboard Cards
                const card = document.createElement('div');
                card.id = `card-${safeId}`;
                card.className = "bg-slate-800 rounded-lg shadow-lg border border-slate-700 p-6 flex flex-col cursor-pointer hover:bg-slate-700 hover:border-slate-600 transition-all transform hover:scale-105";
                card.onclick = () => switchTab(sheetName);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2 bg-cyan-500 bg-opacity-20 text-cyan-400 rounded-lg">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2m0 0V3a2 2 0 00-2-2h-2a2 2 0 00-2 2v2z"></path></svg>
                        </div>
                        <span class="text-xs font-semibold px-2 py-1 bg-slate-700 text-slate-300 rounded-full status-badge">0%</span>
                    </div>
                    <h4 class="text-lg font-semibold text-slate-100">${sheetName}</h4>
                    <p class="text-sm text-slate-400 mt-1 mb-4 flex-1">Complete the mandatory quality checks for this platform.</p>
                    <div>
                        <div class="flex justify-between text-xs text-slate-400 mb-1">
                            <span>Progress</span>
                            <span class="progress-text">0 / ${appState[sheetName].total}</span>
                        </div>
                        <div class="w-full bg-slate-700 rounded-full h-2">
                            <div class="bg-cyan-500 h-2 rounded-full transition-all duration-500 progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                `;
                dashboardGrid.appendChild(card);

                // 4. Generate Data Tables (Sheets)
                const sheetDiv = document.createElement('div');
                sheetDiv.id = `sheet-${safeId}`;
                sheetDiv.className = "sheet-view hidden-view bg-slate-800 border border-slate-700 rounded-lg shadow-lg overflow-hidden";
                sheetDiv.dataset.sheetName = sheetName;
                
                let tableHTML = `
                    <div class="px-6 py-5 border-b border-slate-700 bg-slate-800 print-only" style="display:none;">
                        <h3 class="text-xl font-bold text-slate-100">QC Checklist: ${sheetName}</h3>
                        <p class="text-sm text-slate-400">Official Quality Control Document</p>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-900 text-slate-200 text-sm leading-normal border-b border-slate-700">
                                    <th class="py-3 px-4 font-semibold w-12 text-center border-r border-slate-700">#</th>
                                    <th class="py-3 px-4 font-semibold w-1/6 border-r border-slate-700">Category</th>
                                    <th class="py-3 px-4 font-semibold w-1/4 border-r border-slate-700">Check Item</th>
                                    <th class="py-3 px-4 font-semibold w-1/4 border-r border-slate-700">Criteria</th>
                                    <th class="py-3 px-4 font-semibold w-32 border-r border-slate-700 text-center">Result</th>
                                    <th class="py-3 px-4 font-semibold border-r border-slate-700">Notes</th>
                                    <th class="py-3 px-4 font-semibold w-24 border-r border-slate-700">Sign</th>
                                    <th class="py-3 px-4 font-semibold w-32">Date</th>
                                </tr>
                            </thead>
                            <tbody class="text-slate-300 text-sm">
                `;

                qcData[sheetName].forEach(item => {
                    tableHTML += `
                        <tr class="border-b border-slate-700 hover:bg-slate-700 transition-colors">
                            <td class="py-3 px-4 text-center font-medium border-r border-slate-700">${item.no}</td>
                            <td class="py-3 px-4 border-r border-slate-700 text-slate-300">${item.category}</td>
                            <td class="py-3 px-4 border-r border-slate-700 font-medium text-slate-200">${item.check_item}</td>
                            <td class="py-3 px-4 border-r border-slate-700 text-slate-400 text-xs">${item.criteria}</td>
                            <td class="py-3 px-4 border-r border-slate-700 text-center">
                                <select class="w-full bg-slate-700 border border-slate-600 text-slate-200 py-1.5 px-2 rounded focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 text-sm transition-colors"
                                    onchange="updateRowColor(this, '${sheetName}')">
                                    <option value="" disabled selected>-</option>
                                    <option value="Pass">Pass</option>
                                    <option value="Fail">Fail</option>
                                    <option value="N/A">N/A</option>
                                </select>
                            </td>
                            <td class="py-3 px-4 border-r border-slate-700">
                                <textarea rows="1" class="w-full bg-slate-700 border-0 border-b border-slate-600 focus:border-cyan-500 focus:ring-0 resize-none text-sm p-1 rounded text-slate-200" placeholder="Add notes..."></textarea>
                            </td>
                            <td class="py-3 px-4 border-r border-slate-700">
                                <input type="text" class="checked-by w-full bg-slate-700 border-0 border-b border-slate-600 focus:border-cyan-500 focus:ring-0 text-sm p-1 uppercase text-center text-slate-200 rounded" placeholder="initials">
                            </td>
                            <td class="py-3 px-4">
                                <input type="date" class="date-field w-full bg-slate-700 border-0 border-b border-slate-600 focus:border-cyan-500 focus:ring-0 text-sm p-1 text-slate-200 rounded">
                            </td>
                        </tr>
                    `;
                });

                tableHTML += `</tbody></table></div>`;
                sheetDiv.innerHTML = tableHTML;
                sheetsContainer.appendChild(sheetDiv);
            });
            
            // Set initial state
            updateDashboardStats();
        });

        function switchTab(tabId) {
            activeTabID = tabId;
            const safeId = tabId.replace(/\s+/g, '-');
            
            // Reset Sidebar Styles
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'border-r-4', 'border-cyan-500', 'text-cyan-400', 'font-medium');
                btn.classList.add('text-slate-400');
            });
            
            // Set Active Sidebar Style
            const activeBtn = document.getElementById(`nav-${safeId}`) || document.getElementById('nav-dashboard');
            activeBtn.classList.add('bg-slate-800', 'border-r-4', 'border-cyan-500', 'text-cyan-400', 'font-medium');
            activeBtn.classList.remove('text-slate-400');

            // Toggle Views
            const dashboardView = document.getElementById('dashboard-view');
            const sheetsContainer = document.getElementById('sheets-container');
            const bulkTool = document.getElementById('bulk-fill-tool');
            const exportTools = document.getElementById('export-tools');
            const title = document.getElementById('header-title');

            document.querySelectorAll('.sheet-view').forEach(sheet => {
                sheet.classList.add('hidden-view');
                sheet.classList.remove('active-sheet');
            });

            if (tabId === 'dashboard') {
                dashboardView.classList.remove('hidden-view');
                sheetsContainer.classList.add('hidden-view');
                bulkTool.classList.add('hidden');
                exportTools.classList.add('hidden');
                title.textContent = 'Overview Dashboard';
            } else {
                dashboardView.classList.add('hidden-view');
                sheetsContainer.classList.remove('hidden-view');
                bulkTool.classList.remove('hidden');
                exportTools.classList.remove('hidden');
                title.textContent = `${tabId} Checklist`;
                
                const targetSheet = document.getElementById(`sheet-${safeId}`);
                targetSheet.classList.remove('hidden-view');
                targetSheet.classList.add('active-sheet');
            }
        }

        function updateRowColor(selectObj, sheetName) {
            selectObj.classList.remove('status-pass', 'status-fail', 'status-na');
            if (selectObj.value === 'Pass') selectObj.classList.add('status-pass');
            if (selectObj.value === 'Fail') selectObj.classList.add('status-fail');
            if (selectObj.value === 'N/A') selectObj.classList.add('status-na');

            const safeId = sheetName.replace(/\s+/g, '-');
            const sheetDiv = document.getElementById(`sheet-${safeId}`);
            const allSelects = sheetDiv.querySelectorAll('select');
            
            let completed = 0;
            allSelects.forEach(s => {
                if (s.value !== "") completed++;
            });

            appState[sheetName].completed = completed;
            updateDashboardStats();
        }

        function updateDashboardStats() {
            Object.keys(appState).forEach(sheetName => {
                const safeId = sheetName.replace(/\s+/g, '-');
                const data = appState[sheetName];
                const card = document.getElementById(`card-${safeId}`);
                
                if (card) {
                    const percentage = Math.round((data.completed / data.total) * 100);
                    
                    const bar = card.querySelector('.progress-bar');
                    bar.style.width = `${percentage}%`;
                    
                    if(percentage === 100) {
                        bar.classList.replace('bg-cyan-500', 'bg-emerald-500');
                    } else {
                        bar.classList.replace('bg-emerald-500', 'bg-cyan-500');
                    }

                    card.querySelector('.progress-text').textContent = `${data.completed} / ${data.total}`;
                    
                    const badge = card.querySelector('.status-badge');
                    badge.textContent = `${percentage}%`;
                    if(percentage === 100) {
                        badge.classList.replace('bg-slate-700', 'bg-emerald-700');
                        badge.classList.replace('text-slate-300', 'text-emerald-200');
                    }
                }
            });
        }

        function applyBulkFill() {
            if (activeTabID === 'dashboard') return;

            const nameVal = document.getElementById('bulk-name').value.trim();
            const dateVal = document.getElementById('bulk-date').value;
            
            const safeId = activeTabID.replace(/\s+/g, '-');
            const activeSheet = document.getElementById(`sheet-${safeId}`);

            if (nameVal) {
                activeSheet.querySelectorAll('input.checked-by').forEach(input => input.value = nameVal);
            }
            if (dateVal) {
                activeSheet.querySelectorAll('input.date-field').forEach(input => input.value = dateVal);
            }
            
            // Visual feedback
            const btn = document.querySelector('#bulk-fill-tool button');
            const originalText = btn.textContent;
            btn.textContent = "Applied!";
            btn.classList.add('bg-emerald-600');
            btn.classList.remove('btn-secondary');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-emerald-600');
                btn.classList.add('btn-secondary');
            }, 1500);
        }

        function printPDF() {
            if(activeTabID === 'dashboard') {
                alert("Please select a specific checklist from the sidebar to print.");
                return;
            }
            window.print();
        }

        function exportToExcel() {
            if(activeTabID === 'dashboard') {
                alert("Please select a specific checklist to export.");
                return;
            }

            const safeId = activeTabID.replace(/\s+/g, '-');
            const sheetDiv = document.getElementById(`sheet-${safeId}`);
            const table = sheetDiv.querySelector('table');
            
            // Extract table data
            const rows = [];
            table.querySelectorAll('tr').forEach((tr, idx) => {
                const cells = [];
                tr.querySelectorAll('th, td').forEach(cell => {
                    const input = cell.querySelector('input');
                    const select = cell.querySelector('select');
                    const textarea = cell.querySelector('textarea');
                    
                    if (input) cells.push(input.value);
                    else if (select) cells.push(select.value);
                    else if (textarea) cells.push(textarea.value);
                    else cells.push(cell.textContent.trim());
                });
                rows.push(cells);
            });

            // Create workbook
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(rows);
            XLSX.utils.book_append_sheet(wb, ws, activeTabID);
            XLSX.writeFile(wb, `QC_Checklist_${activeTabID}_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function exportToPDF() {
            if(activeTabID === 'dashboard') {
                alert("Please select a specific checklist to export.");
                return;
            }

            const safeId = activeTabID.replace(/\s+/g, '-');
            const sheetDiv = document.getElementById(`sheet-${safeId}`);
            const table = sheetDiv.querySelector('table');
            
            const element = document.createElement('div');
            element.innerHTML = `
                <h1 style="text-align: center; margin-bottom: 20px;">QC Checklist: ${activeTabID}</h1>
                <p style="text-align: center; color: #666; margin-bottom: 20px;">Generated on ${new Date().toLocaleString()}</p>
            `;
            element.appendChild(table.cloneNode(true));
            
            const opt = {
                margin: 10,
                filename: `QC_Checklist_${activeTabID}_${new Date().toISOString().split('T')[0]}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'landscape', unit: 'mm', format: 'a4' }
            };
            
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
